# Reload tmux config
unbind r
bind r source-file ~/.tmux.conf \; display-message " 󰑓 Config reloaded.."

# Unbind the default prefix (Ctrl+b)
unbind C-b

# Set leader key to Alt + q
set -g prefix M-q
bind M-q send-prefix

# Set delay between escape key and command
set -s escape-time 0

# Set mouse on
set -g mouse on

# Movement keybindings
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Disable confirmation for kill-pane
unbind-key x
bind-key x kill-pane

# Disable confirmation for kill-window
unbind-key &
bind-key & kill-window

# Split panes using | and -
bind + split-window -h
bind - split-window -v

# Set status bar at the top
set -g status-position top

# Start counting windows and panes from 1
set -g base-index 1
setw -g pane-base-index 1

# Fix colors in terminal
set-option -g default-terminal "screen-256color"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Theme
set -g @plugin "janoamaral/tokyo-night-tmux"

# Theme settings

# Numbers
set -g @tokyo-night-tmux_window_id_style none
set -g @tokyo-night-tmux_pane_id_style fsquare
set -g @tokyo-night-tmux_zoom_id_style fsquare

# Date
set -g @tokyo-night-tmux_date_format DMY
set -g @tokyo-night-tmux_time_format 24H

# Path
set -g @tokyo-night-tmux_show_path 0
set -g @tokyo-night-tmux_path_format relative # 'relative' or 'full'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

