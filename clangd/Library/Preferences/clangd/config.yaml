CompileFlags:
  Add: [
    -Wall,
    -Wextra,
    -Wshadow,
    -Wconversion,
    -Wfloat-equal,
    -Wpedantic,
    -std=c++20,
    # TODO: adjust macOS paths when you copy or install libraries...
    -isystem, /usr/local/include/open3d,
    -isystem, /usr/local/include/opencv4,
    -isystem, /usr/local/include/eigen3,
    -isystem, /opt/libtorch/include,
    -isystem, /opt/cuda/include,
    -isystem, /opt/TensorRT/include,
  ]
  BuiltinHeaders: QueryDriver
